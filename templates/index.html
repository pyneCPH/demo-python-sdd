<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>European Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "JetBrains Mono", "Courier New", Courier, monospace;
            background: #f0f2f5;
            padding: 2rem 1rem;
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 1.5rem;
            letter-spacing: 0.03em;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            max-width: 1280px;
            margin: 0 auto;
        }

        @media (max-width: 1100px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .city-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.09);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .city-name {
            font-size: 1rem;
            font-weight: 600;
            color: #222;
        }

        .city-country {
            font-size: 0.75rem;
            color: #999;
            margin-top: -0.4rem;
        }

        .current-section {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }

        .current-emoji {
            font-size: 2rem;
            line-height: 1;
        }

        .current-temp {
            font-size: 1.6rem;
            font-weight: 300;
            color: #111;
        }

        .current-condition {
            font-size: 0.75rem;
            color: #777;
        }

        .current-metrics {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: #555;
            padding-top: 0.1rem;
        }

        .metric-label {
            color: #aaa;
            margin-right: 0.15rem;
        }

        .unavailable {
            font-size: 0.85rem;
            color: #bbb;
            padding: 0.5rem 0;
        }

        /* History / Forecast tables */
        .section-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #aaa;
            margin-top: 0.4rem;
            margin-bottom: 0.2rem;
        }

        .day-rows {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .day-row {
            display: grid;
            grid-template-columns: 3.5rem 1fr 2.8rem 2.4rem;
            gap: 0.25rem;
            font-size: 0.72rem;
            color: #444;
            align-items: center;
        }

        .day-row.history-row {
            color: #888;
        }

        .day-date {
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .day-row.history-row .day-date {
            color: #aaa;
        }

        .day-temps {
            color: #333;
        }

        .day-pressure {
            color: #666;
            text-align: right;
        }

        .day-precip {
            color: #5a9fd4;
            text-align: right;
        }

        /* Chart section */
        .chart-toggle {
            font-family: inherit;
            font-size: 0.7rem;
            color: #888;
            background: none;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 0.25rem 0.6rem;
            cursor: pointer;
            margin-top: 0.25rem;
            transition: background 0.15s, color 0.15s;
            align-self: flex-start;
        }

        .chart-toggle:hover {
            background: #f5f5f5;
            color: #444;
        }

        .chart-container {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease-out, opacity 0.25s ease-out;
            opacity: 0;
        }

        .chart-container.expanded {
            max-height: 120px;
            opacity: 1;
        }

        .chart-svg {
            width: 100%;
            height: 90px;
            display: block;
            margin-top: 0.3rem;
        }

        /* Loading / error states */
        .loading-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            max-width: 1280px;
            margin: 0 auto;
        }

        .skeleton-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.09);
            height: 120px;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .page-error {
            text-align: center;
            color: #c0392b;
            font-size: 0.95rem;
            padding: 2rem;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.09);
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>European Weather Dashboard</h1>
    <div id="app"></div>

    <script>
        var appEl = document.getElementById("app");

        function escHtml(text) {
            var d = document.createElement("div");
            d.textContent = String(text);
            return d.innerHTML;
        }

        function formatDate(isoDate) {
            // isoDate: "YYYY-MM-DD"
            var parts = isoDate.split("-");
            var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            var days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
            var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            return days[d.getDay()] + " " + months[d.getMonth()] + " " + d.getDate();
        }

        function renderDayRow(day, isHistory) {
            var rowClass = isHistory ? "day-row history-row" : "day-row";
            return (
                '<div class="' + rowClass + '">' +
                    '<span class="day-date">' + escHtml(formatDate(day.date)) + '</span>' +
                    '<span class="day-temps">' + escHtml(day.temperature_min.toFixed(1)) + '/' + escHtml(day.temperature_max.toFixed(1)) + '°C</span>' +
                    '<span class="day-pressure">' + escHtml(day.surface_pressure.toFixed(0)) + 'hPa</span>' +
                    '<span class="day-precip">' + escHtml(day.precipitation_sum.toFixed(1)) + 'mm</span>' +
                '</div>'
            );
        }

        function buildChartSvg(cityData) {
            // 7 points: history[0..2].temperature_max, current.temperature, forecast[0..2].temperature_max
            var points = [];
            for (var i = 0; i < 3; i++) {
                points.push(cityData.history.length > i ? cityData.history[i].temperature_max : null);
            }
            points.push(cityData.current ? cityData.current.temperature : null);
            for (var i = 0; i < 3; i++) {
                points.push(cityData.forecast.length > i ? cityData.forecast[i].temperature_max : null);
            }

            var validVals = points.filter(function(p) { return p !== null; });
            if (validVals.length < 2) return '<svg class="chart-svg"></svg>';

            var minT = Math.min.apply(null, validVals);
            var maxT = Math.max.apply(null, validVals);
            var range = maxT - minT || 1;

            var W = 200, H = 70, PAD = 8;
            var stepX = (W - PAD * 2) / 6;

            function toX(idx) { return PAD + idx * stepX; }
            function toY(val) { return PAD + (1 - (val - minT) / range) * (H - PAD * 2); }

            // Build path segments, splitting at null points
            function buildPath(startIdx, endIdx, pts) {
                var d = "";
                var first = true;
                for (var i = startIdx; i <= endIdx; i++) {
                    if (pts[i] === null) { first = true; continue; }
                    if (first) {
                        d += "M " + toX(i).toFixed(1) + " " + toY(pts[i]).toFixed(1) + " ";
                        first = false;
                    } else {
                        d += "L " + toX(i).toFixed(1) + " " + toY(pts[i]).toFixed(1) + " ";
                    }
                }
                return d;
            }

            var histPath = buildPath(0, 3, points);  // history + today
            var forecastPath = buildPath(3, 6, points);  // today + forecast

            // Dots
            var histDots = "", forecastDots = "";
            for (var i = 0; i <= 3; i++) {
                if (points[i] !== null) {
                    histDots += '<circle cx="' + toX(i).toFixed(1) + '" cy="' + toY(points[i]).toFixed(1) + '" r="2.5" fill="#7b9ec7"/>';
                }
            }
            for (var i = 3; i <= 6; i++) {
                if (points[i] !== null) {
                    forecastDots += '<circle cx="' + toX(i).toFixed(1) + '" cy="' + toY(points[i]).toFixed(1) + '" r="2.5" fill="#e07b54"/>';
                }
            }

            return (
                '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">' +
                    '<path d="' + histPath + '" fill="none" stroke="#7b9ec7" stroke-width="2" stroke-linejoin="round"/>' +
                    '<path d="' + forecastPath + '" fill="none" stroke="#e07b54" stroke-width="2" stroke-dasharray="4 3" stroke-linejoin="round"/>' +
                    histDots + forecastDots +
                '</svg>'
            );
        }

        function renderCityCard(cityData, cardIndex) {
            var city = cityData.city;
            var current = cityData.current;
            var history = cityData.history || [];
            var forecast = cityData.forecast || [];

            var currentHtml;
            if (!current) {
                currentHtml = '<div class="unavailable">Data unavailable</div>';
            } else {
                currentHtml = (
                    '<div class="current-section">' +
                        '<span class="current-emoji">' + escHtml(current.emoji || "") + '</span>' +
                        '<div>' +
                            '<div class="current-temp">' + escHtml(current.temperature.toFixed(1)) + '°C</div>' +
                            '<div class="current-condition">' + escHtml(current.condition) + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="current-metrics">' +
                        '<span><span class="metric-label">P</span>' + escHtml(current.surface_pressure.toFixed(0)) + ' hPa</span>' +
                        '<span><span class="metric-label">Rain</span>' + escHtml(current.precipitation.toFixed(1)) + ' mm</span>' +
                    '</div>'
                );
            }

            var historyHtml = "";
            if (history.length > 0) {
                historyHtml = '<div class="section-label">History</div><div class="day-rows">';
                for (var i = 0; i < history.length; i++) {
                    historyHtml += renderDayRow(history[i], true);
                }
                historyHtml += '</div>';
            }

            var forecastHtml = "";
            if (forecast.length > 0) {
                forecastHtml = '<div class="section-label">Forecast</div><div class="day-rows">';
                for (var i = 0; i < forecast.length; i++) {
                    forecastHtml += renderDayRow(forecast[i], false);
                }
                forecastHtml += '</div>';
            }

            var chartSvg = buildChartSvg(cityData);
            var chartId = "chart-" + cardIndex;

            return (
                '<div class="city-card">' +
                    '<div class="city-name">' + escHtml(city.city) + '</div>' +
                    '<div class="city-country">' + escHtml(city.country) + '</div>' +
                    currentHtml +
                    historyHtml +
                    forecastHtml +
                    '<button class="chart-toggle" data-chart="' + chartId + '" onclick="toggleChart(this)">&#9650; Temp chart</button>' +
                    '<div class="chart-container" id="' + chartId + '">' + chartSvg + '</div>' +
                '</div>'
            );
        }

        function toggleChart(btn) {
            var chartId = btn.getAttribute("data-chart");
            var container = document.getElementById(chartId);
            if (container.classList.contains("expanded")) {
                container.classList.remove("expanded");
                btn.innerHTML = "&#9650; Temp chart";
            } else {
                container.classList.add("expanded");
                btn.innerHTML = "&#9660; Temp chart";
            }
        }

        function showLoading() {
            var html = '<div class="loading-grid">';
            for (var i = 0; i < 8; i++) {
                html += '<div class="skeleton-card"></div>';
            }
            html += '</div>';
            appEl.innerHTML = html;
        }

        function showError(msg) {
            appEl.innerHTML = '<p class="page-error">' + escHtml(msg) + '</p>';
        }

        async function init() {
            showLoading();
            try {
                var response = await fetch("/api/dashboard");
                if (!response.ok) {
                    showError("Failed to load dashboard data (HTTP " + response.status + ").");
                    return;
                }
                var data = await response.json();
                if (!data.cities || data.cities.length === 0) {
                    showError("No city data returned.");
                    return;
                }
                var html = '<div class="dashboard-grid">';
                for (var i = 0; i < data.cities.length; i++) {
                    html += renderCityCard(data.cities[i], i);
                }
                html += '</div>';
                appEl.innerHTML = html;
            } catch (err) {
                showError("Unable to load dashboard. Please check your connection and try again.");
            }
        }

        init();
    </script>
</body>
</html>
